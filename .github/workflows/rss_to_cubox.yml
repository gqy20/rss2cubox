name: RSS to Cubox

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rss2cubox
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run sync
        env:
          CUBOX_API_URL: ${{ secrets.CUBOX_API_URL }}
          CUBOX_FOLDER: "RSS Inbox"
          KEYWORDS_INCLUDE: ""
          KEYWORDS_EXCLUDE: ""
          MAX_ITEMS_PER_RUN: "20"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          AI_MIN_SCORE: ${{ vars.AI_MIN_SCORE }}
          AI_TIMEOUT_SECONDS: ${{ vars.AI_TIMEOUT_SECONDS }}
        run: |
          rss2cubox

      - name: Commit state
        run: |
          if git status --porcelain | grep -q "state.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update rss state"
            git push
          else
            echo "No state changes."
          fi
