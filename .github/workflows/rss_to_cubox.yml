name: RSS to Cubox

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      push_to_cubox:
        description: 'Push to Cubox (uncheck to only update web data)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: rss2cubox
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run sync
        env:
          CUBOX_API_URL: ${{ (github.event_name == 'schedule' || inputs.push_to_cubox == 'true') && secrets.CUBOX_API_URL || 'skip' }}
          CUBOX_FOLDER: "RSS Inbox"
          KEYWORDS_INCLUDE: ""
          KEYWORDS_EXCLUDE: ""
          MAX_ITEMS_PER_RUN: "20"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          AI_MIN_SCORE: ${{ vars.AI_MIN_SCORE }}
          AI_TIMEOUT_SECONDS: ${{ vars.AI_TIMEOUT_SECONDS }}
          AI_RETRY_ATTEMPTS: ${{ vars.AI_RETRY_ATTEMPTS }}
          AI_RETRY_BACKOFF_SECONDS: ${{ vars.AI_RETRY_BACKOFF_SECONDS }}
          AI_BATCH_SIZE: ${{ vars.AI_BATCH_SIZE }}
          AI_MAX_CANDIDATES: "200"
          ENRICH_MAX_ITEMS: "200"
          RSSHUB_INSTANCES_FILE: "rsshub_instances.txt"
          RUN_EVENTS_FILE: "run_events.jsonl"
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          rss2cubox 2>&1 | tee rss2cubox.log

      - name: Export web data
        env:
          STATE_FILE: "state.json"
          RUN_EVENTS_FILE: "run_events.jsonl"
          WEB_HISTORY_FILE: "web/public/data/updates_history.jsonl"
          WEB_UPDATES_FILE: "web/public/data/updates.json"
          WEB_METRICS_FILE: "web/public/data/metrics.json"
          WEB_UPDATES_LIMIT: "2000"
          WEB_HISTORY_LIMIT: "20000"
        run: |
          rss2cubox-export-web

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rss2cubox-log-${{ github.run_id }}
          path: rss2cubox.log
          if-no-files-found: warn

      - name: Commit state
        run: |
          if git status --porcelain | grep -qE "state.json|run_events.jsonl|web/public/data/updates_history.jsonl|web/public/data/updates.json|web/public/data/metrics.json|web/public/data/global_insights.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json run_events.jsonl web/public/data/updates_history.jsonl web/public/data/updates.json web/public/data/metrics.json web/public/data/global_insights.json
            git commit -m "chore: update rss state, run events and web data"
            git push
          else
            echo "No state changes."
          fi
