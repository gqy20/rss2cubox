name: RSS to Cubox - Quick Test

on:
  workflow_dispatch:
    inputs:
      push_to_cubox:
        description: 'Push to Cubox'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run quick test
        env:
          CUBOX_FOLDER: "Test Inbox"
          KEYWORDS_INCLUDE: ""
          KEYWORDS_EXCLUDE: ""
          MAX_ITEMS_PER_RUN: "3"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          AI_MIN_SCORE: ${{ vars.AI_MIN_SCORE }}
          AI_TIMEOUT_SECONDS: ${{ vars.AI_TIMEOUT_SECONDS }}
          AI_RETRY_ATTEMPTS: ${{ vars.AI_RETRY_ATTEMPTS }}
          AI_RETRY_BACKOFF_SECONDS: ${{ vars.AI_RETRY_BACKOFF_SECONDS }}
          AI_BATCH_SIZE: ${{ vars.AI_BATCH_SIZE }}
          AI_MAX_CANDIDATES: "20"
          # enrich 配置
          ENRICH_MAX_ITEMS: "3"
          ENRICH_MAX_BUDGET_USD: "1.5"
          ENRICH_MIN_SCORE: "0.7"
          # global 配置
          GLOBAL_AGENT_ENABLED: "true"
          # RSS 配置
          RSSHUB_PRIVATE_INSTANCES: ${{ secrets.RSSHUB_PRIVATE_INSTANCES }}
          RSSHUB_BILIBILI_INSTANCES: ${{ secrets.RSSHUB_BILIBILI_INSTANCES || 'https://rss.spriple.org' }}
          RSSHUB_TWITTER_INSTANCES: ${{ secrets.RSSHUB_TWITTER_INSTANCES }}
          RSSHUB_BILIBILI_RETRY_ATTEMPTS: "3"
          RSSHUB_TWITTER_RETRY_ATTEMPTS: "2"
          RSSHUB_INSTANCES_FILE: "rsshub_instances.txt"
          RSSHUB_FAILURE_COOLDOWN_SECONDS: "60"
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          if [[ "${{ inputs.push_to_cubox }}" == "true" ]]; then
            export CUBOX_API_URL="${{ secrets.CUBOX_API_URL }}"
          else
            export CUBOX_API_URL="skip"
          fi
          rss2cubox 2>&1 | tee rss2cubox-test.log

      - name: Upload test log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rss2cubox-test-log-${{ github.run_id }}
          path: rss2cubox-test.log
          if-no-files-found: warn
